<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1Q&2Q 전략과제 중간점검 - 프론트개발팀</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header"></div>
<div id="section-task1"></div>
<div id="section-task2"></div>
<div id="section-work"></div>
<div id="section-growth"></div>
<div id="section-goal"></div>

<script>
  const components = [
    { id: 'header',         src: 'components/header.html' },
    { id: 'section-task1',  src: 'components/section-task1.html' },
    { id: 'section-task2',  src: 'components/section-task2.html' },
    { id: 'section-work',   src: 'components/section-work.html' },
    { id: 'section-growth', src: 'components/section-growth.html' },
    { id: 'section-goal', src: 'components/section-goal.html' },
  ];

  components.forEach(({ id, src }) => {
    fetch(src)
      .then(res => res.text())
      .then(html => {
        document.getElementById(id).innerHTML = html;
      });
  });
</script>

</body>
</html>
